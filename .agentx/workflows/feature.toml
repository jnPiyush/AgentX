# Feature Workflow — Full pipeline for new capabilities
# Usage: Agent X reads this to determine routing and prerequisites

[workflow]
name = "feature"
description = "Standard feature development with full agent pipeline"
type = "feature"

[[steps]]
id = "prd"
title = "Create PRD for {{feature_name}}"
agent = "product-manager"
status_on_start = "Backlog"
status_on_complete = "Ready"
output = "docs/prd/PRD-{{issue_number}}.md"
template = ".github/templates/PRD-TEMPLATE.md"

[[steps]]
id = "ux"
title = "Design UX for {{feature_name}}"
agent = "ux-designer"
needs = ["prd"]
optional = true
condition = "has_label:needs:ux"
status_on_start = "Ready"
status_on_complete = "Ready"
output = "docs/ux/UX-{{issue_number}}.md"
template = ".github/templates/UX-TEMPLATE.md"

[[steps]]
id = "architecture"
title = "Create ADR and Tech Spec"
agent = "architect"
needs = ["prd"]
status_on_start = "Ready"
status_on_complete = "Ready"
output = "docs/adr/ADR-{{issue_number}}.md"
template = ".github/templates/ADR-TEMPLATE.md"
can_clarify = ["product-manager"]
clarify_max_rounds = 3
clarify_sla_minutes = 60
clarify_blocking_allowed = true

[[steps]]
id = "data-science"
title = "Design ML pipeline and evaluation plan"
agent = "data-scientist"
needs = ["prd"]
optional = true
condition = "has_label:type:data-science"
status_on_start = "Ready"
status_on_complete = "Ready"
output = "docs/data-science/DS-{{issue_number}}.md"

[[steps]]
id = "implement"
title = "Implement code and tests"
agent = "engineer"
needs = ["architecture"]
iterate = true
max_iterations = 10
completion_criteria = "All acceptance criteria met, tests pass at 80% coverage, no lint errors, docs updated"
status_on_start = "In Progress"
status_on_complete = "In Review"
can_clarify = ["architect", "product-manager"]
clarify_max_rounds = 3
clarify_sla_minutes = 60
clarify_blocking_allowed = true

[[steps]]
id = "review"
title = "Code review"
agent = "reviewer"
needs = ["implement"]
status_on_start = "In Review"
status_on_complete = "Validating"
output = "docs/reviews/REVIEW-{{issue_number}}.md"
template = ".github/templates/REVIEW-TEMPLATE.md"

[[steps]]
id = "devops"
title = "Validate CI/CD and deployment"
agent = "devops"
needs = ["review"]
optional = true
status_on_start = "Validating"
status_on_complete = "Done"
output = "docs/deployment/DEPLOY-{{issue_number}}.md"

[[steps]]
id = "testing"
title = "Test suite and certification"
agent = "tester"
needs = ["review"]
optional = true
condition = "has_label:needs:testing"
status_on_start = "Validating"
status_on_complete = "Done"
output = "docs/testing/TEST-{{issue_number}}.md"

[[steps]]
id = "bugfix"
title = "Fix defects from testing"
agent = "engineer"
needs = ["testing"]
optional = true
condition = "has_defects"
iterate = true
max_iterations = 5
completion_criteria = "All defects resolved, tests pass, tester confirms fixes"
status_on_start = "In Progress"
status_on_complete = "Done"
